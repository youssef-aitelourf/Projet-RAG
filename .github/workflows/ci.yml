name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # CI has no API keys — use local Ollama-compatible settings for import/index only
      RAG_PROVIDER: ollama_local
      OLLAMA_API_KEY: ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify imports
        run: python scripts/verify_install.py

      - name: Retrieval metrics unit check
        run: |
          python -c "
          from evaluation.retrieval import recall_at_k, mrr
          assert recall_at_k(['a','b'], ['a'], k=2) == 1.0
          assert mrr(['x','a'], ['a']) == 0.5
          print('ok')
          "

      - name: Index smoke (no LLM, no API key)
        run: |
          python -c "
          from src.config import Config
          from src.loader import load_dir
          from src.embedder import Embedder
          from src.vectorstore import VectorStore

          cfg = Config()
          chunks = load_dir('data/samples/')
          store = VectorStore(cfg, Embedder(cfg), collection_name='ci_smoke')
          store.reset()
          store.add(chunks)
          n = store.count()
          assert n > 0, f'expected chunks, got {n}'
          print('indexed', n, 'chunks')
          "
